<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 500px;
    background: #000;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #e7e9ea;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Background glow effects */
  .glow-blue {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(29,155,240,0.15), transparent 70%);
    left: 5%;
    top: -30%;
  }
  .glow-pink {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(249,24,128,0.1), transparent 70%);
    right: 10%;
    bottom: -20%;
  }

  /* Subtle grid pattern */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
    width: 100%;
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 0;
  }
  .logo-x {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -3px;
    background: linear-gradient(135deg, #4FC3F7, #1d9bf0, #0D47A1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-com {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -3px;
    color: #e7e9ea;
  }
  .logo-fun {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -3px;
    color: #1d9bf0;
  }

  .tagline {
    font-size: 20px;
    font-weight: 500;
    color: #71767b;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .divider {
    width: 2px;
    height: 200px;
    background: linear-gradient(to bottom, transparent, rgba(231,233,234,0.15), transparent);
    flex-shrink: 0;
  }

  .features {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .feature-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-blue { background: #1d9bf0; }
  .dot-pink { background: #f91880; }
  .dot-green { background: #00ba7c; }

  .feature-text {
    font-size: 22px;
    font-weight: 600;
    color: #e7e9ea;
    letter-spacing: -0.3px;
  }

  .feature-sub {
    font-size: 15px;
    font-weight: 400;
    color: #71767b;
    margin-top: 2px;
  }

  /* Bottom accent line */
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #1d9bf0, #f91880, #00ba7c);
  }
</style>
</head>
<body>
  <div class="glow-blue"></div>
  <div class="glow-pink"></div>
  <div class="grid"></div>

  <div class="content">
    <div class="left">
      <div class="logo">
        <span class="logo-x">x</span>
        <span class="logo-com">-com</span>
        <span class="logo-fun">.fun</span>
      </div>
      <div class="tagline">X communities are back</div>
    </div>

    <div class="divider"></div>

    <div class="features">
      <div class="feature">
        <div class="feature-dot dot-blue"></div>
        <div>
          <div class="feature-text">Post once, it tweets for you</div>
          <div class="feature-sub">Auto-sync every post to your X account</div>
        </div>
      </div>
      <div class="feature">
        <div class="feature-dot dot-pink"></div>
        <div>
          <div class="feature-text">Create your community</div>
          <div class="feature-sub">Name, banner, members, all in seconds</div>
        </div>
      </div>
      <div class="feature">
        <div class="feature-dot dot-green"></div>
        <div>
          <div class="feature-text">Everything syncs to X</div>
          <div class="feature-sub">Likes, comments, reposts, all connected</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-line"></div>
</body>
</html>
