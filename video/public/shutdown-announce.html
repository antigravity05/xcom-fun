<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>X Communities Shutdown — Announcement</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 1200px;
        height: 675px;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
      }

      .stage {
        position: relative;
        width: 1200px;
        height: 675px;
        padding: 56px 72px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid rgba(239, 68, 68, 0.4);
        background: rgba(239, 68, 68, 0.12);
        color: #fca5a5;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .brand {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .brand .accent { color: #1d9bf0; }

      .center {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        margin-top: 12px;
      }

      h1 {
        font-size: 96px;
        font-weight: 900;
        line-height: 0.98;
        letter-spacing: -0.025em;
        max-width: 1000px;
      }
      h1 .red { color: #f87171; }

      .countdown {
        display: flex;
        gap: 14px;
        margin-top: 36px;
      }

      .unit {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .num {
        width: 100px;
        padding: 14px 0;
        border-radius: 18px;
        border: 1px solid rgba(239, 68, 68, 0.25);
        background: rgba(239, 68, 68, 0.10);
        color: #fff;
        font-size: 56px;
        font-weight: 900;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        text-align: center;
        box-shadow: 0 0 30px rgba(239, 68, 68, 0.18);
      }

      .label {
        margin-top: 10px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.22em;
        color: rgba(252, 165, 165, 0.85);
        text-transform: uppercase;
      }

      .subline {
        margin-top: 28px;
        font-size: 22px;
        font-weight: 600;
        line-height: 1.4;
        color: #fff;
        max-width: 880px;
      }
      .subline .red { color: #f87171; }

      .bottom {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
      }

      .url {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .url .accent { color: #1d9bf0; }

      .move {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: rgba(255, 255, 255, 0.55);
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="top">
        <span class="badge">X Communities Shutdown</span>
        <span class="brand">x-com<span class="accent">.fun</span></span>
      </div>

      <div class="center">
        <h1>
          X kills Communities<br />
          <span class="red">on May 6.</span>
        </h1>

        <div class="countdown" aria-hidden="true">
          <div class="unit"><div class="num">04</div><div class="label">Days</div></div>
          <div class="unit"><div class="num">09</div><div class="label">Hours</div></div>
          <div class="unit"><div class="num">17</div><div class="label">Minutes</div></div>
          <div class="unit"><div class="num">44</div><div class="label">Seconds</div></div>
        </div>

        <p class="subline">
          Once your community is gone, your members
          <span class="red">can&apos;t be regrouped</span>. Move them here while you still can.
        </p>
      </div>

      <div class="bottom">
        <span class="url">→ x-com<span class="accent">.fun</span></span>
        <span class="move">Move yours before it&apos;s too late</span>
      </div>
    </div>
  </body>
</html>
