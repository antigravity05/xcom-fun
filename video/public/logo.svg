<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 52" fill="none">
  <defs>
    <linearGradient id="xGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#1d9bf0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>

  <!-- "x" stylized -->
  <text x="0" y="42" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" letter-spacing="-2" fill="url(#xGrad)">x</text>

  <!-- "-com" in white -->
  <text x="28" y="42" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" letter-spacing="-2" fill="#ffffff">-com</text>

  <!-- ".fun" in accent blue -->
  <text x="178" y="42" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" letter-spacing="-2" fill="#1d9bf0">.fun</text>
