<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>x-com.fun importer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 16px;
        width: 340px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #000;
        color: #fff;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 14px;
        font-weight: 800;
      }
      .sub {
        margin: 0 0 12px;
        font-size: 12px;
        color: #888;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 999px;
        background: #1d9bf0;
        color: #fff;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.1);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #aaa;
        line-height: 1.5;
      }
      .stats {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .stat {
        background: #111;
        border-radius: 8px;
        padding: 8px;
        text-align: center;
      }
      .stat-value {
        font-size: 18px;
        font-weight: 800;
        color: #fff;
      }
      .stat-label {
        font-size: 10px;
        text-transform: uppercase;
        color: #888;
        letter-spacing: 0.08em;
        margin-top: 2px;
      }
      pre {
        margin-top: 12px;
        max-height: 200px;
        overflow: auto;
        background: #111;
        border-radius: 6px;
        padding: 8px;
        font-size: 10px;
        line-height: 1.4;
        color: #ccc;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .hint {
        margin-top: 8px;
        padding: 8px;
        font-size: 11px;
        line-height: 1.4;
        color: #fca5a5;
        background: rgba(239, 68, 68, 0.08);
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>x-com.fun importer (POC)</h1>
    <p class="sub">Open a community page on X, then click scan.</p>

    <button id="scan">Scan visible tweets</button>

    <div class="status" id="status">Ready.</div>

    <div class="stats" id="stats" style="display: none">
      <div class="stat">
        <div class="stat-value" id="stat-found">0</div>
        <div class="stat-label">Found</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-parsed">0</div>
        <div class="stat-label">Parsed</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-failed">0</div>
        <div class="stat-label">Failed</div>
      </div>
    </div>

    <pre id="output" style="display: none"></pre>
    <div class="hint" id="hint" style="display: none"></div>

    <script src="popup.js"></script>
  </body>
</html>
