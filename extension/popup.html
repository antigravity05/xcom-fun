<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>x-com.fun importer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 16px;
        width: 360px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #000;
        color: #fff;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 14px;
        font-weight: 800;
      }
      .sub {
        margin: 0 0 14px;
        font-size: 12px;
        color: #888;
      }
      .button-row {
        display: flex;
        gap: 8px;
      }
      button {
        flex: 1;
        padding: 10px 12px;
        border: none;
        border-radius: 999px;
        background: #1d9bf0;
        color: #fff;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.1);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.secondary {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        color: #ccc;
      }
      button.danger {
        background: #b91c1c;
      }
      .counters {
        margin: 14px 0 6px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .counter {
        text-align: center;
        background: #0a0a0a;
        border: 1px solid #1a1a1a;
        border-radius: 10px;
        padding: 10px 4px;
      }
      .counter .count {
        font-size: 28px;
        font-weight: 900;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .counter .label {
        margin-top: 4px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #888;
      }
      .counter.sent .count {
        color: #34d399;
      }
      .meta {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin-bottom: 10px;
      }
      .meta .row {
        background: #111;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 11px;
        color: #aaa;
      }
      .meta .row .k {
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 9px;
        margin-bottom: 2px;
      }
      .meta .row .v {
        color: #fff;
        font-weight: 700;
      }
      .status {
        margin: 8px 0;
        font-size: 12px;
        color: #aaa;
        line-height: 1.4;
      }
      .status.error {
        color: #fca5a5;
      }
      .status.warn {
        color: #fbbf24;
      }
      .status.ok {
        color: #34d399;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-right: 4px;
      }
      .pill.idle {
        background: #1a1a1a;
        color: #888;
      }
      .pill.running {
        background: rgba(29, 155, 240, 0.18);
        color: #60a5fa;
      }
      .pill.done {
        background: rgba(52, 211, 153, 0.15);
        color: #34d399;
      }
      .pill.throttled {
        background: rgba(251, 191, 36, 0.15);
        color: #fbbf24;
      }
      .pill.stopped {
        background: #1a1a1a;
        color: #888;
      }
      .pill.error,
      .pill.auth_failed {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
      }
      .hint {
        margin-top: 8px;
        padding: 8px;
        font-size: 11px;
        line-height: 1.4;
        color: #fca5a5;
        background: rgba(239, 68, 68, 0.08);
        border-radius: 6px;
      }
      hr {
        border: none;
        border-top: 1px solid #1a1a1a;
        margin: 14px 0 10px;
      }
      .section-title {
        font-size: 11px;
        color: #666;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .token-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .token-row input {
        flex: 1;
        padding: 8px 10px;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        background: #0a0a0a;
        color: #fff;
        font-size: 11px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }
      .token-row input:focus {
        outline: none;
        border-color: #1d9bf0;
      }
      .token-row button {
        flex: 0 0 auto;
        padding: 8px 12px;
        font-size: 11px;
      }
      .token-status {
        font-size: 11px;
        margin-top: 4px;
        color: #888;
      }
      .token-status.has-token {
        color: #34d399;
      }
      .debug-row {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }
      .debug-row button {
        flex: 1;
        padding: 6px 8px;
        font-size: 11px;
      }
      pre {
        margin-top: 10px;
        max-height: 160px;
        overflow: auto;
        background: #111;
        border-radius: 6px;
        padding: 8px;
        font-size: 10px;
        line-height: 1.4;
        color: #ccc;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>x-com.fun importer (POC)</h1>
    <p class="sub" id="sub">Open a community page on X to begin.</p>

    <div class="button-row" id="primary-controls">
      <button id="start">Start auto-import</button>
      <button id="stop" class="danger" style="display: none">Stop</button>
    </div>

    <div class="counters">
      <div class="counter">
        <div class="count" id="count-accumulated">0</div>
        <div class="label">Accumulated</div>
      </div>
      <div class="counter sent">
        <div class="count" id="count-sent">0</div>
        <div class="label">Sent</div>
      </div>
    </div>

    <div class="meta">
      <div class="row">
        <div class="k">Status</div>
        <div class="v" id="status-pill"><span class="pill idle">Idle</span></div>
      </div>
      <div class="row">
        <div class="k">Passes</div>
        <div class="v" id="passes">0</div>
      </div>
    </div>

    <div class="status" id="status">Ready.</div>
    <div class="hint" id="hint" style="display: none"></div>

    <hr />

    <div class="section-title">Import token</div>
    <div class="token-row">
      <input id="token-input" type="password" placeholder="Paste token from x-com.fun" />
      <button id="token-save" class="secondary">Save</button>
    </div>
    <div class="token-status" id="token-status">No token set — tweets accumulate locally only.</div>

    <hr />

    <div class="section-title">Debug</div>
    <div class="debug-row">
      <button id="scan-now" class="secondary">Scan visible now</button>
      <button id="dump" class="secondary">Dump JSON</button>
    </div>

    <pre id="output" style="display: none"></pre>

    <script src="popup.js"></script>
  </body>
</html>
