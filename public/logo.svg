<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 52" fill="none">
  <defs>
    <linearGradient id="xGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="30%" stop-color="#1E88E5"/>
      <stop offset="60%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="xShine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#B3E5FC" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#4FC3F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D47A1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="xGrad2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="35%" stop-color="#1976D2"/>
      <stop offset="70%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="xShine2" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#B3E5FC" stop-opacity="0.8"/>
      <stop offset="35%" stop-color="#4FC3F7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0D47A1" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#1E88E5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Stylized X -->
  <g filter="url(#shadow)" transform="translate(2,2)">
    <path d="M32 0 L44 0 L12 48 L0 48 Z" fill="url(#xGrad2)" opacity="0.85"/>
    <path d="M32 0 L44 0 L12 48 L0 48 Z" fill="url(#xShine2)" opacity="0.5"/>
    <path d="M0 0 L12 0 L44 48 L32 48 Z" fill="url(#xGrad1)"/>
    <path d="M0 0 L12 0 L44 48 L32 48 Z" fill="url(#xShine)" opacity="0.6"/>
    <path d="M18 20 L22 16 L26 20 L22 28 Z" fill="#B3E5FC" opacity="0.35"/>
  </g>

  <!-- "-com" in cyan blue -->
  <text x="52" y="38" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="900" letter-spacing="-0.5" fill="#4FC3F7">-com</text>

  <!-- ".fun" in light gray -->
  <text x="148" y="38" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="900" letter-spacing="-0.5" fill="#E0E0E0">.fun</text>
</svg>
